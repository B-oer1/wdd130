<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting</title>
    <meta name="description"
      content="Whitewater rafting serves you efficiently with effective communication via contacts yours and ours.">
    <meta name="author" content="Oladele Blessed">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-crossedoars.jpeg" alt="Rapds raft with crossed oars" width="200">
        <!-- <div id="logo">White Water Rafting</div> -->
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact">
            <p>White Water Rafting</p>
            <span>123 Main River Street</span><br>
            <span>Kolob, California</span><br>
            <span>+1 999 999 9999</span><br>
            <span>info@whitewater.com</span>
        </div>
        <div class="middle">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d809117.2761761084!2d-121.87443519435745!3d37.611234140017096!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1s123%20Main%20River%20Street%2C%20Kolob%2C%20California!5e0!3m2!1sen!2sng!4v1775857395328!5m2!1sen!2sng"
                  width="400" height="500" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
            <div class="fill-in">
                <form>
                    <fieldset>
                        <div class="form-item column2">
                            <label for="name">Name</label>
                            <input type="text" id="fullname" name="fullname" placeholder="John Doe"
                              required>
                        </div>
                        <div class="form-item column2">
                            <label for="useremail">Email</label>
                            <input type="email" id="useremail" name="useremail"
                              placeholder="bless@gmail.com" required>
                        </div>
                        <div class="form-item column2">
                            <legend>Message Purpose</legend>
                            <label for="general">General Inquiry</label>
                            <input type="radio" name="purpose" id="purpose" value="general">
                            <label for="reseveration">Reservation Question</label>
                            <input type="radio" name="purpose" id="reseveration"
                              value="reseveration">
                            <label for="website">Website Suggestion</label>
                            <input type="radio" name="purpose" id="website" value="website">
                        </div>
                        <div class="form-item">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="4"
                              placeholder="Type here"></textarea>
                        </div>
                        <div class="form-item">
                            <label for="newsletter">Please Subscribe me to the monthly
                                newsletter</label>
                            <input type="checkbox" id="newsletter" name="newsletter">
                        </div>
                        <button type="submit">Get in Touch!</button>
                    </fieldset>
                </form>
            </div>
        </div>
        <section class="service">
            <p>We Are Here to Serve You</p>
            <div class="profile">
                <figure>
                    <img src="/wwr/images/image-anne.jpg" alt="Anne Wallace's Profile Picture">
                    <figcaption>Anne Wallace</figcaption>
                </figure>
                <figure>
                    <img src="/wwr/images/image-colton.jpg" alt="Colton Jone's Profile Picture">
                    <figcaption>Colton Jone</figcaption>
                </figure>
                <figure>
                    <img src="/wwr/images/image-irene.jpg" alt="Irene Solera's Profile Picture">
                    <figcaption>Irene Solera</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy;2026 🚣🏽‍♀️ White Water Rafting 🚣🏽‍♀️ Oladele Blessed</p>
        <nav class="socialmedia">
            <a href="https://discord.com"> <img src="images/discord-icon-svgrepo-com.svg"
                  alt="Discord Icon" width="30"></a>
            <a href="https://snapchat.com"> <img src="images/snapchat-logo-svgrepo-com.svg"
                  alt="Snapchat Icon" width="30"></a>
            <a href="https://tiktok.com"> <img src="images/tiktok-svgrepo-com.svg" alt="Tiktok Icon"
                  width="30"></a>
        </nav>
    </footer>
</body>

</html>
