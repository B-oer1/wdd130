    <meta charset="UTF-8">

    <meta name="description"
      content="Make an exploration of the possiblities you can enjoy with White Water Rafting.">
    <meta name="author" content="Oladele Blessed">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-crossedoars.jpeg" alt="Rapds raft with crossed oars" width="200">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>

    <main>
        <div class="hero">
            <img src="images/raftinghappy_600.jpg" alt="6 happy rafting clients and an employee">
            <h1 class="explore">MAKE AN EXPLORATION</h1>
            <div class="book-container">
                <p class="being">Let your adventurous being out</p>
                <a href="trips.html"><span class="book">Explore!</span></a>
            </div>
            <div class="fill">
                <form>
                    <fieldset>
                        <p id="news-p">For Newsletters</p>
                        <div class="text-group">
                            <div class="text-option">
                                <label for="fullname">Name</label>
                                <input type="text" id="fullname" name="fullname"
                                  placeholder="John Doe" required>
                            </div>
                            <div class="text-option">
                                <label for="useremail">Email</label>
                                <input type="email" id="useremail" name="useremail"
                                  placeholder="bless@gmail.com" required>
                            </div>
                        </div>
                        <button type="submit">Sign Up!</button>
                    </fieldset>
                </form>
            </div>
        </div>
        <div class="zero2">
            <div id="d1"><img src="./images/rafting2_600.jpg"
                  alt="Raft containg about 10 people holding an oar each"><span>Purpose</span></div>
            <div id="d2">
                <img src="./images/rafting1_600.jpg" alt="10 rafters after a trip">
                <span>Offering</span>
            </div>
        </div>
