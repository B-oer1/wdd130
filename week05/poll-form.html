<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll-form</title>
    <link rel="stylesheet" href="./styles/poll-form.css">
</head>

<body>
    <header>
        WDD 130 | HTML Form - User Poll
    </header>
    <main>
        <form>
            <fieldset>
                <legend>
                    <h1> Contact Information</h1>
                </legend>

                <div class="form-item column2">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                <div class="form-item column2">
                    <label for="useremail">Email:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>
            </fieldset>
            <fieldset>
                <legend>
                    <h1>Questions</h1>
                </legend>
                <div class="form-item">
                    <label for="browser">What is your favorite browser?</label>
                    <select name="browser" id="browser">
                        <option value="1">Chrome</option>
                        <option value="2">Safari</option>
                        <option value="3">Edge</option>
                        <option value="4">Brave</option>
                        <option value="5">Other</option>
                    </select>
                </div>
                <div class="form-item">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>
                <div class="form-item">
                    <label for="feedback">List the places you have lived:</label>
                    <textarea id="feedback" name="feedback" rows="4"
                      placeholder="Sierra lone, Stillwater Florida, Amsterdam Netherlands, Timbuktu Mali"></textarea>
                </div>
                <button type="submit">Submit Poll</button>
            </fieldset>
        </form>
    </main>
    <footer>
        ©️ 2026 | HTML Form - User Poll Activity | Blessed Oladele
    </footer>
</body>

</html>
